# Netlify build settings for Next.js (OpenNext adapter is applied automatically).
# Docs: https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps=false"

# Redirect apex → www when you attach a custom domain (optional; enable after DNS is set).
# [[redirects]]
#   from = "https://example.com/*"
#   to = "https://www.example.com/:splat"
#   status = 301
#   force = true
